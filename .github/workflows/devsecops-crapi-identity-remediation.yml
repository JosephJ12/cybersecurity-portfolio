name: crAPI Identity Dependency Remediation Validation

on:
  push:
    branches:
      - main
    paths:
      - 'appsec-projects/devsecops-security-pipeline-owasp-crapi/crapi/services/identity/**'
      - 'renovate.json'
      - '.github/workflows/devsecops-crapi-identity-remediation.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'appsec-projects/devsecops-security-pipeline-owasp-crapi/crapi/services/identity/**'
      - 'renovate.json'
      - '.github/workflows/devsecops-crapi-identity-remediation.yml'

  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read

env:
  COMPOSE_FILE: deploy/docker/docker-compose.yml
  SERVICE_NAME: crapi-identity
  VERSION: ${{ github.sha }}
  IMAGE_REF: crapi/crapi-identity:${{ github.sha }}

jobs:
  trivy-identity-image-scan:
    name: Trivy Identity Image Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: appsec-projects/devsecops-security-pipeline-owasp-crapi/crapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build crAPI identity image from local source
        run: |
          docker build \
            --pull \
            --no-cache \
            -t crapi/crapi-identity:${{ github.sha }} \
            -f services/identity/Dockerfile.security-scan \
            services/identity

      - name: Scan rebuilt image with Trivy - Text report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: crapi/crapi-identity:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          output: trivy-crapi-identity-critical.txt
          exit-code: '0'
      
      - name: Scan rebuilt image with Trivy - SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: crapi/crapi-identity:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-crapi-identity-critical.sarif
          exit-code: '0'
      
      - name: Upload Trivy evidence artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-crapi-identity-critical-scan
          path: |
            trivy-crapi-identity-critical.sarif
            trivy-crapi-identity-critical.txt
      
      - name: Enforce Trivy critical vulnerability gate
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: crapi/crapi-identity:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'